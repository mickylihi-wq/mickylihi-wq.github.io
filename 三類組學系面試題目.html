<script>

        "醫學系": `為什麼想當醫生？請分享一個讓你下定決心的「關鍵時刻」。\n除了醫學，你高中時期最投入的領域是什麼？這對你當醫生有何幫助？\n醫師的工作時數長且壓力極大，你平時如何排解壓力？\n你認為自己身上哪一個缺點，最可能成為你行醫路上的障礙？\n醫學系要念六年，加上培訓，你如何確保十年後仍保有初衷？\n請分享一次你面臨「重大失敗」的經驗，當時你是如何復原的？\n如果你今年沒考上，你會選擇重考還是轉向其他醫療相關科系？\n你最敬佩的一位醫學前輩是誰？他具備什麼樣讓你嚮往的特質？\n若醫院只有一台葉克膜，但有兩位病人需要（80歲名醫與20歲青年），你會給誰？\n當病人的自主意願與家屬期待衝突時，身為醫師你如何抉擇？\n如果你發現你的指導教授在論文數據上造假，你會如何處理？\n你支持「醫師罷工」嗎？當職業權益與病患性命衝突時，界線在哪？\n若病患確診癌症末期，家屬要求「隱瞞病情」，你是否會告訴真相？\n對於「代理孕母」或「安樂死」合法化，說明立場。\n如果你因為疏忽導致醫療錯誤，但家屬並未發現，你會主動告知嗎？\n台灣健保點值過低，對醫療品質有何影響？\n你如何看待「五大皆空」的現象？\nAI 輔助診斷日益成熟，你認為醫師會被取代嗎？\n對於「偏鄉醫療資源不足」與「醫師公費生制度」看法？\n遠距醫療最大的風險是什麼？\n台灣進入超高齡社會，醫師在「長照」體系中的角色？\n如何看待日益嚴重的「醫療暴力」問題？\n診間病患情緒失控並指責你診斷錯誤，如何應對？\n如何向家屬宣告病人死亡（Bad News Telling）？\n同事疑似在值班前飲酒，你該如何反應？\n病患執意採用未經證實的「民俗療法」，你會勸導嗎？\n面對久病厭世、一心求死的病人，如何跟他對話？\n醫學是「科學」還是「人文學」？\n如果你有經費可以改善台灣醫療現況，你想投入在哪？\n最後，請給我們一個「非錄取你不可」的理由。`,

        "牙醫系": `牙醫需要長時間高度專注於微小空間，具備這種特質嗎？\n牙醫強調「手感」，你有什麼興趣或專長能證明手眼協調？\n請分享一次你完成一件精細作品的經驗，過程中遇到什麼困難？\n術科考試表現不如預期，你覺得原因出在哪？\n牙醫師常有職業病，你有持續運動的習慣來維持體力嗎？\n你認為「美感」在牙醫領域中佔有多大重要性？\n描述一個在短時間內做出精確決策的經驗。\n為什麼選擇牙醫系而不是醫學系？\n你對本校牙醫系的課程安排有哪些了解？哪門課最吸引你？\n你如何看待現在牙醫診所高度飽和的現況？\n未來想留在醫學中心還是自行開業？\n對「偏鄉牙科醫療資源缺乏」有什麼看法？\n若未來你的手部因意外受傷無法再手術，你會如何轉職？\n牙醫系修業年限長且課業繁重，心理準備為何？\n如果病患要求你拔掉一顆明明還可以治療的牙齒，你答應嗎？\n遇到對牙科器材極度恐懼的兒童病患，你會如何處理？\n發現前一位醫師留下的補綴物有瑕疵，會主動告知嗎？\n病患質疑自費項目太貴是在賺黑心錢，如何溝通？\n親戚要求私下開立強效止痛藥（無掛號）如何處理？\n不小心損壞昂貴牙科器材的反應？\n遇到術後發生預期之外的併發症，但你並無疏失，如何面對家屬？\n你對「數位牙醫學（3D列印）」的了解？\n如何看待「隱型矯治」在社群媒體上的盛行與風險？\n你認為牙醫師在預防「口腔癌」過程中扮演什麼角色？\n對於健保項目與「自費植牙」之間的平衡看法？\n如何看待 AI 在放射線照片診斷的發展？\n你對「高齡化社會」下的到宅牙醫服務有何見解？\n若把牙醫比喻成建築師或雕刻家，你選哪一個？\n向五歲小孩解釋什麼是「根管治療」。\n面試結束後讓面試官記住你的一個標籤是什麼？`,

        "中醫系": `為什麼選擇中醫系而不是西醫？理由為何？\n如何用現代科學語言解釋「陰陽五行」理論？\n中醫理論抽象，你有哪些特質能幫助你鑽研古籍？\n分享一本你讀過與中醫、哲學或傳統文化相關的書。\n學習中醫需要人文關懷還是理性的邏輯分析？\n平常有觀察自然節氣或養生的習慣嗎？\n家人認為中醫是迷信，你會如何溝通？\n對本校「中西醫雙修」或「單修」制度的看法？\n未來想成為純中醫還是中西醫結合醫師？\n中醫師在現代醫療體系中的定位？\n對「科學中藥」與「傳統煎劑」差異的看法？\n接受中醫治療的經驗如何影響報考動機？\n對「針灸術」在國際被認可現象的觀察？\n藥學系與中醫系的中藥課程出發點有何不同？\n「清冠一號」帶來的契機或挑戰？\n認同中醫「見效慢」這個觀點嗎？\n對「針灸/推拿」納入健保給付的看法？\n面對網路上流傳的轉骨方，如何發揮衛教功能？\n精準醫療與中醫「辯證論治」結合的看法？\n如何建立民眾對中藥材安全（重金屬等）的信心？\nAI 脈診儀能取代醫師的四診嗎？\n當病患同時服用西藥與中藥時的評估？\n病患執意放棄化療只想靠中醫調理如何處理？\n針灸過程中病人「暈針」的反應？\n病人要求開立昂貴但不對症藥材的回應？\n發現同事標榜「神醫」並販售偏方的處理？\n面對失去耐心的慢性病患如何安撫？\n用一種「植物」形容中醫？\n中醫處理「亞健康」狀態的優勢？\n向全世界推薦一項中醫特色會是什麼？`,

        "藥學系": `請簡述「專利藥」與「學名藥」的差異。\n何謂「醫藥分業」？對制度的看法？\nTFDA（食品藥物管理署）的主要職掌？\n台灣健保制度的優缺點？\n對「指示藥」轉為「非處方藥」的看法。\n如何預防藥物浪費？過期藥物如何處理？\n對「AI 科技結合藥學」的看法？\n印象最深刻的醫藥相關新聞。\n中西藥交互作用的重要性舉例。\n如何辨別網路醫療資訊真假？\n1 分鐘自我介紹。\n為什麼想讀藥學系？啟發事件？\n藥學系課業重，適合本系的特質？\n同時錄取醫/牙/藥的選擇？\n為什麼選擇本校藥學系？\n高中最喜歡與不喜歡的科目？\n若沒錄取，接下來的計畫？\n未來職涯規劃（醫院、藥局、藥廠）？\n展現細心（或粗心）的經驗。\n備審中提到的經驗對藥師工作的幫助？\n遇到質疑藥效的激動病患如何應對？\n發現資深藥師調劑錯誤怎麼辦？\n親友索取處方外管制藥品如何拒絕？\n勸導長輩不購買地下電台藥物？\n醫師劑量開錯且堅持不改的處置？\n病患要求優先處理藥物的回應？\n安樂死或墮胎等倫理議題看法。\n如何維持工作熱忱？\n現代藥師除了醫藥知識最需要的能力？\n有什麼問題想要問面試官？`,

        "公共衛生學系": `為什麼選擇公衛系而非臨床科系？\n公衛是「無聲的功勞」，如何獲得成就感？\n適合讀公衛的特質？\n分享高中團隊合作或組織規劃經驗。\n對公衛哪個子領域最有興趣？\n「公衛師法」通過後的實質影響？\n用一個關鍵字形容「公共衛生」。\n解釋預防醫學第一、二、三段預防。\n大數據與 AI 在流病監測的應用。\n政策有效但民眾反對時的抉擇。\n電子菸是否應全面禁止？\n高齡社會公衛最迫切的問題？\n心理健康應視為公衛核心議題嗎？\n環境荷爾蒙對健康的威脅舉例。\nCOVID-19 疫情學到的最大教訓？\n如何看待並推廣解決「疫苗猶豫」？\n「糖稅」徵收對肥胖率的影響看法。\n健保破產危機下如何預防性節流？\n對「醫療分級制度」遲遲無法落實的看法。\n氣候變遷對傳染病分布的影響。\n針對青少年憂鬱症盛行設計介入計畫。\n個人隱私與全民防疫監控的衝突標準。\n如何推廣校園保險套販賣機？\n預算有限選癌末藥物還是兒童塗氟？\n公衛人在醫療謠言中的責任。\n規劃社區減重比賽的邏輯。\n工廠疑似造成罹癌率上升但證據不明的處置。\n對哪個國家的公衛政策印象深刻？\n公衛專家最需要的軟實力？\n畢業十年後希望在哪個位置貢獻？`,

        "職能治療系": `一句話定義心中的「職能治療」。\n為什麼選 OT 而非 PT 或護理？\n分享幫助他人克服困難完成目標的經驗。\n適合當 OT 的人格特質？\n對 OT 三大領域的了解程度？\n社團經驗如何轉化為治療師養分？\n用一個物品形容 OT。\n理解「全人治療」與「功能獨立」。\n生活中改善無障礙空間的實例。\n心理健康與生理功能哪個重要？\n設計中風長者的復健遊戲。\n對「輔具」如何改變生活的認識。\n如何看待「職能正義」？\n幫助失去雙手但想畫畫的藝術家。\n遇到挫折拒絕配合復健的病人應對？\n如何與過度代勞的家屬溝通？\n病患目標與身體現況無法達成時的引導。\n如何克制對特定病患的恐懼？\n與醫療團隊意見分歧時的爭取。\n面對想輕生的患者的第一反應。\n長照 2.0 中 OT 的角色。\nAI 與 VR 在 OT 復健中的應用。\n針對「成癮問題」OT 提供的幫助。\n對「社區職能治療」的看法。\n高齡社會 OT 如何預防失能？\n看待精障者回歸社會的標籤化問題。\nOT 工作如何維持熱忱？\n除了醫療機構還想在哪些領域推廣 OT？\n「好的治療師」與「專業的治療師」差別？\n畢業後帶給病人最大的影響？`,

        "醫工系": `為什麼選擇醫工系，而不是純機械或純醫學系？\n「醫學工程師」在醫療團隊中扮演的角色？\n分享高中時期最感興趣的科學實驗經驗。\n認為自己有哪些特質適合讀醫工？\n目前對哪個醫工子領域最有興趣？\n備審的作品如何與醫療應用結合？\n用一個「電子零件」形容你自己。\n對「生物感測器」的了解與舉例。\n看待「人工器官」目前的技術瓶頸？\n舉出一種最需要被「改良」的醫療器材。\n醫工系需要強大數理基礎，如何應對？\n生醫材料植入人體最核心的要求？\n偵測長者健康的穿戴式裝置會加入哪些功能？\n對「復健機器人」在 PT 中的未來發展看法？\n設計醫材有瑕疵但醫師急著救人，如何抉擇？\n醫材應走「平價大眾化」還是「高端精準化」？\n研發醫材意外造成病患受傷應承擔什麼責任？\n醫學與工程專才意見不合如何調解？\n對「基因編輯」或「生物晶片」倫理問題看法？\n開發「偵測疾病」儀器還是「治療疾病」機器？\n看待「AI 影像診斷」會取代放射科醫師嗎？\n對「遠距醫療」硬體設備普及的看法？\n對「3D 生物列印技術」的期待。\n智慧醫療趨勢下醫工師如何防範資安問題？\n印象最深刻的生醫科技新聞？\n「奈米機器人」在癌症標靶治療中的潛力？\n如何確保畢業後仍能跟上科技發展？\n傾向大型醫材廠研發還是生醫新創團隊？\n優秀醫工師最需要的「軟實力」？\n解釋醫工系對人類健康至關重要。`,

        "物理治療系": `為什麼想當 PT？分享讓你產生熱忱的故事。\n簡述 PT 與 OT 在治療目標上的最大差異。\nPT體力消耗極大，你平時如何鍛鍊？\n物理治療是「輔助醫療」還是「獨立醫療」？\n展現哪些特質讓你覺得適合 PT？\n除了醫院，PT 還可以在哪些場域服務？\n用一個「人體部位」形容 PT。\n對四大領域哪一個最有興趣？\n解釋何謂「運動處方」。\n看待「徒手治療」與「儀器治療」的權衡？\nPT 專業與坊間「整復推拿」區別？\n「心理狀態」會影響復健進度嗎？\n「預防勝於治療」在 PT 中的應用。\n舉出常見錯誤姿勢並說明長期影響。\n遇到脾氣暴躁拒絕配合運動的病患應對？\n病患問「我真的會好嗎？」時如何回答？\n病患要求開藥或診斷（超出專業）如何拒絕？\n建立中風失能年輕運動員復健動機？\n家屬催促治療進度時的溝通？\n實習發現病人傷情是因疏失造成的處理？\n高齡社會下 PT 在居家醫療（長照）中作用？\n看待「自費物理治療診所」盛行的現象？\n對於「物理治療師法」修法的看法？\n穿戴式裝置數據對物理治療有幫助嗎？\nPT 該如何介入「運動醫學」市場？\n看待「遠距復健」的優勢與限制？\nPT 處理病人的「痛」，你具備同理心嗎？\n畢業後成為「通才」還是「專家」？\n重複單調復健工作如何維持熱情？\n最後給我們一個非錄取你不可的理由。`,

        "護理系": `為什麼想當護理師？影響最深的事件。\n如何確定能適應護理輪班與體力消耗？\n哪一種特質最適合當護理師？\n為什麼選擇護理而非醫學或藥學？\n分享照顧他人或志工經驗。\n如何克服對血跡、傷口或排泄物的障礙？\n如何說服反對你讀護理的家人？\n「優秀」與「平庸」護理師差別在哪？\n護理師在團隊中的角色與醫師關係？\n對「男護理師」優勢與挑戰的看法？\n護理文書記錄的價值看法？\n護理畢業後的職涯發展選擇？\n對「全人護理」的理解？\n「專業技術」與「溫暖關懷」哪個重要？\n病患按鈴要求處理小事的應對？\n遇到家屬暴力如何自保與處理？\n發現人員給藥錯誤的處理方式？\n面對久病厭世拒絕配合治療的對話？\n醫囑讓人疑慮時該怎麼做？\n如何向家屬解釋「Bad News」？\n忙碌中與夥伴衝突的團隊合作？\n對台灣「護病比」過高議題看法？\n對「學姐學妹制」職場文化準備？\n「智慧醫療」對護理負擔影響？\n超高齡社會下護理師的角色？\n經歷疫情後對「護理英雄」說法感想？\n支持醫護爭取權益而罷工嗎？\n護理壓力大，減壓與調整心情方法？\n五年後的護理領域目標？\n給我們一個非錄取你不可的理由。`,

        "營養系": `為什麼想當營養師？啟發的生活經驗。\n「喜歡煮飯/吃美食」就適合營養系嗎？\n營養師與廚師、醫師在角色上有何不同？\n適合讀營養系的特質？\n營養師就職管道中對哪塊最有興趣？\n備審經驗如何讓你堅定選擇本系？\n用一種食物形容自己。\n向面試官解釋何謂「六大類食物」。\n如何看待「間歇性斷食」？真的健康嗎？\n「生酮飲食」的潛在風險？\n為外食族設計減脂午餐的原則？\n「保健食品」與「藥品」定義差異？\n精緻糖對健康的威脅看法。\n「基改食品」是福利還是災難？\n長輩堅持喝檸檬水減肥如何勸導？\n病患抱怨餐點難吃拒絕進食怎麼辦？\n團膳廚房未遵守規範的處理？\n親友詢問網路上昂貴瘦身產品有效嗎的回應？\n面對肥胖而自卑、甚至有厭食傾向個案如何溝通？\n偏鄉學校午餐平衡營養與成本？\n「外送平台」普及後的正負面影響？\n「植物肉」能完全取代真肉營養嗎？\n社群媒體泛濫「不科學減肥法」看法。\n高齡社會銀髮營養（質地調整）了解？\n政府「減糖政策」或「包裝標示」改進空間？\nAI 科技對營養師工作的影響？\n如何確保跟上最新的營養研究？\n營養師最核心價值？\n營養學在「運動表現」上的貢獻？\n最後給我們一個非錄取你不可的理由。`,

        "獸醫學系": `為什麼想當獸醫？下定決心的關鍵事件。\n「喜歡動物」與「適合獸醫」的差別？\n處理血水、異味與排泄物的準備？\n獸醫與人醫最大的差別？\n獸醫體力抗壓要求，如何鍛鍊？\n養寵物經驗對報考獸醫系的影響？\n沒考上的備選計畫？\n「經濟動物」與「伴侶動物」地位差異看法？\n「流浪動物安樂死」立場？\n飼主因經濟困難放棄救治的勸導？\n「實驗動物」在研究中的必要性？\n寵物「美容手術」你會答應嗎？\n被動物咬傷後的第一反應？\n對「人畜共通傳染病（One Health）」理解？\n向悲痛飼主宣告死訊的方式？\n質疑醫術導致寵物死亡的應對？\n發現同仁調劑錯誤的處理？\n對「非法繁殖場」問題的社會影響力？\n飼主用網路偏方取代醫療的衛教？\n急診室急救優先順序的決定？\n對「專科獸醫師」制度發展看法？\n對「貓友善醫院」的看法？\n「寵物保險」普及率不高的主因？\n「野生動物救傷」與「外來種移除」衝突？\n對 AI 影像辨識在獸醫判讀的期待？\n未來傾向小動物、大動物還是藥廠？\n修業長課業重，如何平衡生活？\n現代獸醫師最需要的軟實力？\n畢業十年後希望貢獻的位置？\n給我們一個「非錄取你不可」的理由。`,

        "口腔衛生學系": `為什麼選口衛系而非牙醫系？\n「口衛師」在團隊中的核心角色？\n分享高中推廣口腔健康的經驗。\n口衛師需要與人近距離接觸的特質？\n本系課程最感興趣的部分？\n口衛師除了診所外的職涯發展？\n用一個「潔牙工具」形容自己。\n教導排斥刷牙幼兒的方式？\n對嚼檳榔病患的口腔衛教？\n化解「洗牙牙縫變大」誤解的方式？\n身障者口腔照護最大的挑戰？\n「牙線」與「牙間刷」必要性區別？\n病患因你「不是醫生」而拒絕建議應對？\n植牙後的維護指導原則？\n情緒激動不耐久候病患的安撫？\n對《口腔衛生人員法》影響的看法？\n「預防勝於治療」具體展現？\n市售美白產品的衛教建議？\n支持校園含氟漱口水政策嗎？\n高齡社會口腔機能向上訓練看法？\nAI 影像輔助判讀牙周病看法？\n口衛師在「口腔癌預防」作用？\n長維固定姿勢手部穩定的準備？\n枯燥重複性工作維持熱忱的方式？\n精細動作能力（模型、繪畫）？\n實習刺傷（針扎）標準處理流程？\n與醫師意見不合時的處理？\n未來十年台灣最需要的口腔觀念？\n大學四年想培養的軟實力？\n最後給我們一個非錄取你不可的理由。`,

        "生命科學系": `為什麼選生科系而非醫藥相關系？\n最讓你著迷的生物學現象？\n生科「出路受限」說法的看法與準備？\n關注科學期刊的近期主題分享。\n具備哪些特質適合做研究？\n最有意義或印象最深的生物實驗。\n用一個「細胞構造」形容自己。\n實驗數據與預期相反時的第一步？\n「重複性」在科學研究中的重要性？\n實驗連續失敗三個月的堅持或選擇？\n生科界最急需解決的難題？\nAI 導入生信分析的看法？\n無限預算下最想進行的研究？\n辨別科學新聞真假的方式？\n「CRISPR」應用於人類胚胎看法？\n「實驗動物」與福利平衡立場？\n「基改食品」安全性環境影響立場？\n「人工合成生命」倫理挑戰看法？\n科學家應為研究後果負法律責任嗎？\n生科人在氣候變遷與滅絕中的角色？\n「幹細胞研究」爭議與未來看法。\n對近年諾貝爾生醫獎項目的了解？\n經歷疫情對病毒演化的新體認？\n「精準醫療」基因檢測商業化看法？\n生物多樣性流失對生存威脅見解。\n「老化」視為可治療疾病的看法？\n傾向基礎研究還是產品研發？\n大學最想進入哪類實驗室？\n閱讀大量英文文獻的規劃？\n具備科學家潛力的具體證明。`
    };

    const departments = ["醫學系", "牙醫系", "中醫系", "藥學系", "公共衛生學系", "職能治療系", "醫工系", "物理治療系", "護理系", "營養系", "獸醫學系", "口腔衛生學系", "生命科學系"];

    let originalQuestions = [];
    let remainingQuestions = [];

    const nav = document.getElementById('dept-nav');
    departments.forEach(dept => {
        const btn = document.createElement('button');
        btn.innerText = dept;
        btn.onclick = () => switchDept(dept);
        nav.appendChild(btn);
    });

    function switchDept(dept) {
        document.getElementById('current-dept-title').innerText = `${dept} 面試練習`;
        Array.from(nav.children).forEach(btn => btn.className = btn.innerText === dept ? 'active' : '');
        document.getElementById('questionInput').value = deptData[dept];
        backToSetup();
    }

    function startPractice() {
        const text = document.getElementById('questionInput').value;
        originalQuestions = text.split('\n').map(q => q.trim()).filter(q => q !== "");
        
        if (originalQuestions.length > 0) {
            remainingQuestions = [...originalQuestions];
            updateProgress();
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('practice-section').classList.remove('hidden');
            document.getElementById('display-area').innerText = "點擊按鈕開始練習全部 " + originalQuestions.length + " 題！";
        }
    }

    function pickQuestion() {
        if (remainingQuestions.length === 0) {
            alert("🎉 太強了！這輪所有題目都練習完畢，系統將自動重設。");
            remainingQuestions = [...originalQuestions];
        }

        const randomIndex = Math.floor(Math.random() * remainingQuestions.length);
        const selected = remainingQuestions[randomIndex];
        remainingQuestions.splice(randomIndex, 1);
        
        document.getElementById('display-area').innerText = selected;
        updateProgress();
    }

    function updateProgress() {
        document.getElementById('progressDisplay').innerText = `剩餘題數：${remainingQuestions.length} / ${originalQuestions.length}`;
    }

    function backToSetup() {
        document.getElementById('setup-section').classList.remove('hidden');
        document.getElementById('practice-section').classList.add('hidden');
    }

    switchDept("醫學系");
</script>
