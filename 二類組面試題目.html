    const departments = ["電機系", "資工系", "光電系", "機械系", "材料系", "化工系", "土木系", "建築系", "數學系", "物理系", "化學系", "地科系"];

    let originalQuestions = [];
    let remainingQuestions = [];

    const nav = document.getElementById('dept-nav');
    departments.forEach(dept => {
        const btn = document.createElement('button');
        btn.innerText = dept;
        btn.onclick = () => switchDept(dept);
        nav.appendChild(btn);
    });

    function switchDept(dept) {
        document.getElementById('current-dept-title').innerText = `${dept} 面試練習`;
        Array.from(nav.children).forEach(btn => btn.className = btn.innerText === dept ? 'active' : '');
        document.getElementById('questionInput').value = deptData[dept];
        backToSetup();
    }

    function startPractice() {
        const text = document.getElementById('questionInput').value;
        originalQuestions = text.split('\n').map(q => q.trim()).filter(q => q !== "");
        
        if (originalQuestions.length > 0) {
            remainingQuestions = [...originalQuestions];
            updateProgress();
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('practice-section').classList.remove('hidden');
            document.getElementById('display-area').innerText = "點擊按鈕開始練習全部 " + originalQuestions.length + " 題！";
        }
    }

    function pickQuestion() {
        if (remainingQuestions.length === 0) {
            alert("🎉 太強了！這輪所有題目都練習完畢，系統將自動重設。");
            remainingQuestions = [...originalQuestions];
        }

        const randomIndex = Math.floor(Math.random() * remainingQuestions.length);
        const selected = remainingQuestions[randomIndex];
        remainingQuestions.splice(randomIndex, 1);
        
        document.getElementById('display-area').innerText = selected;
        updateProgress();
    }

    function updateProgress() {
        document.getElementById('progressDisplay').innerText = `剩餘題數：${remainingQuestions.length} / ${originalQuestions.length}`;
    }

    function backToSetup() {
        document.getElementById('setup-section').classList.remove('hidden');
        document.getElementById('practice-section').classList.add('hidden');
    }

    // 預設載入第一個科系
    switchDept(departments[0]);
</script>
