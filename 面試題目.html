<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試練習器 - 盲測模式</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #1a73e8; margin-bottom: 2rem; }
        
        /* 隱藏輸入區的樣式 */
        #setup-section {
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .hidden { display: none; }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .btn-save { background-color: #34a853; color: white; }
        .btn-random { background-color: #1a73e8; color: white; width: 100%; font-size: 1.2rem; }
        .btn-edit { background-color: #f8f9fa; color: #5f6368; border: 1px solid #dadce0; margin-top: 20px; }
        
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        #display-area {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            border: 2px dashed #1a73e8;
            padding: 25px;
            border-radius: 12px;
            font-size: 1.6rem;
            color: #202124;
            margin: 20px 0;
            line-height: 1.4;
        }
        
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e8f0fe;
            color: #1967d2;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎤 自訂題目練習</h1>

    <!-- 題目輸入區 -->
    <div id="setup-section">
        <textarea id="questionInput" placeholder="請貼上你的科系面試題目（每行一題）..."></textarea>
        <button class="btn-save" onclick="saveAndHide()">儲存並開始練習</button>
    </div>

    <!-- 練習顯示區 (預設隱藏，儲存後顯示) -->
    <div id="practice-section" class="hidden">
        <div id="countTag" class="status-tag">題庫已就緒</div>
        <div id="display-area">準備好了嗎？點擊下方按鈕抽題</div>
        <button class="btn-random" onclick="pickQuestion()">🎲 隨機跳一題</button>
        <button class="btn-edit" onclick="showSetup()">重新編輯題庫</button>
    </div>
</div>

<script>
    let questions = [];

    // 儲存並隱藏清單
    function saveAndHide() {
        const text = document.getElementById('questionInput').value;
        questions = text.split('\n').map(q => q.trim()).filter(q => q !== "");
        
        if (questions.length > 0) {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('practice-section').classList.remove('hidden');
            document.getElementById('countTag').innerText = `題庫共有 ${questions.length} 題，已進入練習模式`;
            document.getElementById('display-area').innerText = "點擊按鈕開始隨機抽題";
        } else {
            alert("請先輸入題目喔！");
        }
    }

    // 顯示編輯區
    function showSetup() {
        document.getElementById('setup-section').classList.remove('hidden');
        document.getElementById('practice-section').classList.add('hidden');
    }

    // 隨機抽選
    function pickQuestion() {
        const display = document.getElementById('display-area');
        const randomIndex = Math.floor(Math.random() * questions.length);
        const selected = questions[randomIndex];
        
        // 增加一點跳轉動畫感
        display.style.opacity = 0;
        setTimeout(() => {
            display.innerText = selected;
            display.style.opacity = 1;
        }, 150);
    }
</script>

</body>
</html>
