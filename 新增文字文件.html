<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>升學領航員 | 專業批改</title>
  <!-- 引入 Tailwind CSS 來處理網頁排版與樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 隱藏元素的輔助樣式 */
    .hidden-step { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen">

  <!-- 導覽列 -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <svg class="text-blue-600 w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        <span class="text-xl font-bold text-slate-900">升學領航員 | 專業批改</span>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">
    
    <!-- 進度條 -->
    <div class="mb-8">
      <div class="flex items-center justify-between relative">
        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-slate-200 -z-10 rounded-full"></div>
        <div id="progress-line" class="absolute left-0 top-1/2 -translate-y-1/2 h-1 bg-blue-600 -z-10 rounded-full transition-all duration-300 w-0"></div>
        
        <div id="step-marker-1" class="flex flex-col items-center bg-slate-50 px-2 text-blue-600">
          <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold mb-2 bg-blue-600 text-white shadow-md">1</div>
          <span class="text-sm font-medium hidden sm:block">填寫資料與檔案</span>
        </div>
        <div id="step-marker-2" class="flex flex-col items-center bg-slate-50 px-2 text-slate-400">
          <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold mb-2 bg-slate-200 text-slate-500">2</div>
          <span class="text-sm font-medium hidden sm:block">確認與付款</span>
        </div>
        <div id="step-marker-3" class="flex flex-col items-center bg-slate-50 px-2 text-slate-400">
          <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold mb-2 bg-slate-200 text-slate-500">3</div>
          <span class="text-sm font-medium hidden sm:block">完成送出</span>
        </div>
      </div>
    </div>

    <!-- ========================================= -->
    <!-- 步驟 1: 填寫資料與檔案上傳 -->
    <!-- ========================================= -->
    <div id="step-1-container">
      <form id="form-step-1" class="space-y-6">
        
        <!-- 基本資料區塊 -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-4">
            <svg class="text-blue-500 w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            學生基本資料
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">真實姓名 <span class="text-red-500">*</span></label>
              <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <input required type="text" id="input-name" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="例如：王小明" />
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">就讀學校 <span class="text-red-500">*</span></label>
              <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 8-4 8 4"></path><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"></path><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"></path><path d="M18 5v17"></path><path d="M6 5v17"></path><circle cx="12" cy="9" r="2"></circle></svg>
                <input required type="text" id="input-school" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="例如：建國中學" />
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">聯絡電話 <span class="text-red-500">*</span></label>
              <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <input required type="tel" id="input-phone" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="例如：0912345678" />
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-700">電子信箱 (Email) <span class="text-red-500">*</span></label>
              <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
                <input required type="email" id="input-email" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="用於接收批改結果" />
              </div>
            </div>
          </div>
        </div>

        <!-- 檔案繳交區塊 -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-4">
            <svg class="text-blue-500 w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><line x1="10" x2="8" y1="9" y2="9"></line></svg>
            批改項目與檔案繳交
          </h2>
          
          <div class="space-y-6">
            <!-- 選擇繳交檔案類型 -->
            <div class="space-y-3">
              <label class="text-sm font-medium text-slate-700">選擇繳交檔案類型 <span class="text-red-500">*</span></label>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <label id="type-portfolio" class="cursor-pointer border-2 border-blue-500 bg-blue-50 rounded-xl p-4 flex items-start gap-4 transition-all">
                  <input type="radio" name="fileType" value="portfolio" checked class="mt-1 w-4 h-4 text-blue-600 focus:ring-blue-500" />
                  <div>
                    <div class="font-bold text-slate-900">學習歷程檔案批改</div>
                    <div class="text-sm text-slate-500 mt-1">針對自傳、讀書計畫、多元表現提供深度架構與內容建議。</div>
                    <div class="text-blue-600 font-bold mt-2">NT$ 350</div>
                  </div>
                </label>

                <label id="type-essay" class="cursor-pointer border-2 border-slate-200 hover:border-blue-200 rounded-xl p-4 flex items-start gap-4 transition-all">
                  <input type="radio" name="fileType" value="essay" class="mt-1 w-4 h-4 text-blue-600 focus:ring-blue-500" />
                  <div>
                    <div class="font-bold text-slate-900">單篇作文批改</div>
                    <div class="text-sm text-slate-500 mt-1">針對作文進行評分、錯字糾正與文句潤飾建議（中英文皆可）。</div>
                    <div class="text-blue-600 font-bold mt-2">NT$ 100</div>
                  </div>
                </label>
              </div>
            </div>

            <!-- 繳交方式選擇 -->
            <div class="space-y-3 pt-4 border-t border-slate-100">
              <label class="text-sm font-medium text-slate-700">繳交方式</label>
              <div class="flex gap-4">
                <button type="button" id="btn-method-file" class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-800 text-white">
                  直接上傳檔案
                </button>
                <button type="button" id="btn-method-link" class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                  提供雲端連結 (推薦)
                </button>
              </div>

              <!-- 檔案上傳區 -->
              <div id="section-file" class="mt-4 border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:bg-slate-50 transition-all">
                <input type="file" id="input-file" class="hidden" accept=".pdf,.doc,.docx" />
                <label for="input-file" class="cursor-pointer flex flex-col items-center gap-3">
                  <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m16 16-4-4-4 4"></path></svg>
                  </div>
                  <div class="space-y-1">
                    <p id="file-name-display" class="text-slate-700 font-medium">點擊或拖曳檔案至此上傳</p>
                    <p class="text-xs text-slate-500">支援 PDF, Word 格式，檔案大小限制 10MB 內</p>
                  </div>
                </label>
              </div>

              <!-- 雲端連結區 -->
              <div id="section-link" class="mt-4 space-y-2 hidden-step">
                <div class="relative">
                  <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                  <input type="url" id="input-link" class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="貼上 Google Drive 共用連結 (請記得開啟權限)" />
                </div>
                <div class="flex items-center gap-1 text-xs text-amber-600 bg-amber-50 p-2 rounded-md">
                  <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>
                  <span>檔案若超過 10MB 或包含大量圖片，強烈建議使用雲端連結。</span>
                </div>
              </div>

            </div>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" id="btn-next" disabled class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all opacity-50 cursor-not-allowed">
            下一步：確認與付款
          </button>
        </div>
      </form>
    </div>

    <!-- ========================================= -->
    <!-- 步驟 2: 確認與付款 -->
    <!-- ========================================= -->
    <div id="step-2-container" class="hidden-step space-y-6">
      <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-4">
          <svg class="text-blue-500 w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><line x1="10" x2="8" y1="9" y2="9"></line></svg>
          訂單內容確認
        </h2>
        <div class="bg-slate-50 rounded-xl p-6 space-y-4">
          <div class="grid grid-cols-3 gap-4 text-sm border-b border-slate-200 pb-4">
            <div class="text-slate-500">申請人</div>
            <div id="summary-name" class="col-span-2 font-medium"></div>
          </div>
          <div class="grid grid-cols-3 gap-4 text-sm border-b border-slate-200 pb-4">
            <div class="text-slate-500">聯絡方式</div>
            <div id="summary-contact" class="col-span-2 font-medium"></div>
          </div>
          <div class="grid grid-cols-3 gap-4 text-sm border-b border-slate-200 pb-4">
            <div class="text-slate-500">繳交檔案</div>
            <div id="summary-file" class="col-span-2 font-medium text-blue-600"></div>
          </div>
          <div class="grid grid-cols-3 gap-4 text-sm items-center pt-2">
            <div class="text-slate-500">服務項目</div>
            <div class="col-span-2 flex justify-between items-center">
              <span id="summary-service" class="font-bold text-lg"></span>
              <span id="summary-price" class="font-bold text-xl text-blue-600"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 border-b pb-4">
          <svg class="text-blue-500 w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"></rect><line x1="2" x2="22" y1="10" y2="10"></line></svg>
          選擇付款方式
        </h2>
        <div class="space-y-4">
          <label class="cursor-pointer border-2 border-blue-500 bg-blue-50 rounded-xl p-4 flex items-center gap-4">
            <input type="radio" name="payment" checked class="w-4 h-4 text-blue-600" />
            <div class="flex-1">
              <div class="font-bold text-slate-900">信用卡線上刷卡</div>
              <div class="text-sm text-slate-500">支援 VISA, MasterCard, JCB</div>
            </div>
          </label>
          <label class="cursor-pointer border-2 border-slate-200 rounded-xl p-4 flex items-center gap-4">
            <input type="radio" name="payment" class="w-4 h-4 text-blue-600" />
            <div class="flex-1">
              <div class="font-bold text-slate-900">ATM 虛擬帳號轉帳</div>
              <div class="text-sm text-slate-500">取得專屬帳號後至實體或網路 ATM 轉帳</div>
            </div>
          </label>
        </div>
      </div>

      <div class="flex justify-between items-center pt-4">
        <button type="button" id="btn-back" class="text-slate-500 hover:text-slate-800 font-medium px-4 py-2 transition-colors">
          返回修改
        </button>
        <button type="button" id="btn-submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all flex items-center gap-2">
          <span id="submit-text">確認送出並付款</span>
        </button>
      </div>
    </div>

    <!-- ========================================= -->
    <!-- 步驟 3: 完成畫面 -->
    <!-- ========================================= -->
    <div id="step-3-container" class="hidden-step bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-100 text-center">
      <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      </div>
      <h2 class="text-3xl font-bold text-slate-900 mb-4">檔案繳交成功！</h2>
      <p class="text-slate-600 mb-8 max-w-md mx-auto">
        我們已經收到 <span id="final-name" class="font-medium text-slate-900"></span> 同學的資料及款項。<br/>
        系統已發送一封確認信至 <span id="final-email" class="font-medium text-slate-900"></span>。
      </p>
      
      <div class="bg-blue-50 rounded-xl p-6 text-left max-w-md mx-auto mb-8">
        <h3 class="font-bold text-blue-900 mb-2">後續流程說明：</h3>
        <ul class="text-sm text-blue-800 space-y-2 list-disc list-inside">
          <li>老師將於 3-5 個工作天內完成專業批改。</li>
          <li>批改完成後，建議報告將直接寄送至您的信箱。</li>
          <li>若有任何問題，請透過官方 Line 聯繫我們。</li>
        </ul>
      </div>

      <button id="btn-restart" class="text-blue-600 font-medium hover:underline">
        返回首頁
      </button>
    </div>

  </main>

  <!-- 原生 JavaScript 邏輯 -->
  <script>
    // 狀態變數
    let currentStep = 1;
    let fileType = 'portfolio'; // portfolio 或 essay
    let uploadMethod = 'file'; // file 或 link
    let price = 350;

    // 取得 DOM 元素
    const step1 = document.getElementById('step-1-container');
    const step2 = document.getElementById('step-2-container');
    const step3 = document.getElementById('step-3-container');
    
    // 按鈕
    const btnNext = document.getElementById('btn-next');
    const btnBack = document.getElementById('btn-back');
    const btnSubmit = document.getElementById('btn-submit');
    const btnRestart = document.getElementById('btn-restart');
    
    // 輸入框
    const inputs = ['input-name', 'input-school', 'input-phone', 'input-email', 'input-link'];
    inputs.forEach(id => {
      document.getElementById(id).addEventListener('input', validateForm);
    });

    // 檔案選擇器
    document.getElementById('input-file').addEventListener('change', function(e) {
      const display = document.getElementById('file-name-display');
      if (this.files && this.files[0]) {
        display.textContent = this.files[0].name;
        display.classList.add('text-blue-600');
      } else {
        display.textContent = '點擊或拖曳檔案至此上傳';
        display.classList.remove('text-blue-600');
      }
      validateForm();
    });

    // 檔案類型切換
    document.getElementsByName('fileType').forEach(radio => {
      radio.addEventListener('change', function() {
        const typePortfolio = document.getElementById('type-portfolio');
        const typeEssay = document.getElementById('type-essay');
        
        if (this.value === 'portfolio') {
          fileType = 'portfolio';
          price = 350;
          typePortfolio.className = "cursor-pointer border-2 border-blue-500 bg-blue-50 rounded-xl p-4 flex items-start gap-4 transition-all";
          typeEssay.className = "cursor-pointer border-2 border-slate-200 hover:border-blue-200 rounded-xl p-4 flex items-start gap-4 transition-all";
        } else {
          fileType = 'essay';
          price = 100;
          typeEssay.className = "cursor-pointer border-2 border-blue-500 bg-blue-50 rounded-xl p-4 flex items-start gap-4 transition-all";
          typePortfolio.className = "cursor-pointer border-2 border-slate-200 hover:border-blue-200 rounded-xl p-4 flex items-start gap-4 transition-all";
        }
      });
    });

    // 上傳方式切換
    document.getElementById('btn-method-file').addEventListener('click', () => setUploadMethod('file'));
    document.getElementById('btn-method-link').addEventListener('click', () => setUploadMethod('link'));

    function setUploadMethod(method) {
      uploadMethod = method;
      const btnFile = document.getElementById('btn-method-file');
      const btnLink = document.getElementById('btn-method-link');
      const secFile = document.getElementById('section-file');
      const secLink = document.getElementById('section-link');

      if (method === 'file') {
        btnFile.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-800 text-white";
        btnLink.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200";
        secFile.classList.remove('hidden-step');
        secLink.classList.add('hidden-step');
      } else {
        btnLink.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-800 text-white";
        btnFile.className = "px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200";
        secLink.classList.remove('hidden-step');
        secFile.classList.add('hidden-step');
      }
      validateForm();
    }

    // 表單驗證 (確認所有欄位都有填寫才開放下一步)
    function validateForm() {
      const name = document.getElementById('input-name').value.trim();
      const school = document.getElementById('input-school').value.trim();
      const phone = document.getElementById('input-phone').value.trim();
      const email = document.getElementById('input-email').value.trim();
      const file = document.getElementById('input-file').files[0];
      const link = document.getElementById('input-link').value.trim();

      const isBasicFilled = name && school && phone && email;
      const isUploadFilled = uploadMethod === 'file' ? !!file : !!link;

      if (isBasicFilled && isUploadFilled) {
        btnNext.disabled = false;
        btnNext.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all";
      } else {
        btnNext.disabled = true;
        btnNext.className = "bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all opacity-50 cursor-not-allowed";
      }
    }

    // 流程控制函數
    btnNext.addEventListener('click', () => {
      // 填入摘要資料
      document.getElementById('summary-name').textContent = `${document.getElementById('input-name').value} (${document.getElementById('input-school').value})`;
      document.getElementById('summary-contact').textContent = `${document.getElementById('input-email').value} / ${document.getElementById('input-phone').value}`;
      
      const fileText = uploadMethod === 'file' 
        ? document.getElementById('input-file').files[0].name 
        : '已提供雲端連結';
      document.getElementById('summary-file').textContent = fileText;
      
      document.getElementById('summary-service').textContent = fileType === 'portfolio' ? '學習歷程檔案批改' : '單篇作文批改';
      document.getElementById('summary-price').textContent = `NT$ ${price}`;
      document.getElementById('submit-text').textContent = `確認送出並付款 NT$ ${price}`;

      updateStep(2);
    });

    btnBack.addEventListener('click', () => updateStep(1));

    btnSubmit.addEventListener('click', () => {
      btnSubmit.disabled = true;
      btnSubmit.classList.add('opacity-70', 'cursor-wait');
      document.getElementById('submit-text').textContent = '處理中...跳轉至綠界金流';
      
      // 模擬讀取2秒後跳轉完成頁
      setTimeout(() => {
        document.getElementById('final-name').textContent = document.getElementById('input-name').value;
        document.getElementById('final-email').textContent = document.getElementById('input-email').value;
        updateStep(3);
        
        btnSubmit.disabled = false;
        btnSubmit.classList.remove('opacity-70', 'cursor-wait');
      }, 2000);
    });

    btnRestart.addEventListener('click', () => {
      document.getElementById('form-step-1').reset();
      document.getElementById('file-name-display').textContent = '點擊或拖曳檔案至此上傳';
      document.getElementById('file-name-display').classList.remove('text-blue-600');
      validateForm();
      updateStep(1);
    });

    // 切換頁面顯示與進度條
    function updateStep(step) {
      currentStep = step;
      
      // 控制區塊顯示
      step1.classList.toggle('hidden-step', step !== 1);
      step2.classList.toggle('hidden-step', step !== 2);
      step3.classList.toggle('hidden-step', step !== 3);

      // 控制進度條
      document.getElementById('progress-line').style.width = step === 1 ? '0%' : step === 2 ? '50%' : '100%';
      
      // 更新圓圈顏色
      const markers = [
        document.getElementById('step-marker-1'),
        document.getElementById('step-marker-2'),
        document.getElementById('step-marker-3')
      ];

      markers.forEach((marker, index) => {
        const circle = marker.querySelector('div');
        if (step > index) {
          marker.classList.remove('text-slate-400');
          marker.classList.add('text-blue-600');
          circle.className = "w-8 h-8 rounded-full flex items-center justify-center font-bold mb-2 bg-blue-600 text-white shadow-md";
        } else {
          marker.classList.add('text-slate-400');
          marker.classList.remove('text-blue-600');
          circle.className = "w-8 h-8 rounded-full flex items-center justify-center font-bold mb-2 bg-slate-200 text-slate-500";
        }
      });
      
      window.scrollTo(0, 0);
    }
  </script>
</body>
</html>
